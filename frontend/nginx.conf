server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API REST al backend — evita problemas de CORS en producción
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Necesario para subida de PDFs grandes
        client_max_body_size 50M;
    }

    # Todas las rutas no encontradas vuelven a index.html (Vue Router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}